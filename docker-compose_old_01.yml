# POC-Agent-AI-ouvertures-echecs-FFE/docker-compose.yml


# =========================
# VERSION
# =========================
# version: "3.9"

# =========================
# SERVICES
# =========================
services:

  # =========================
  # 🧠 BACKEND (FastAPI)
  # =========================
  backend:
    build: ./backend
    container_name: fastapi_app

    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"

    env_file:
      - .env

    depends_on:
      - milvus
      - mongodb

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${BACKEND_PORT:-8000}/docs || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - app-network


  # =========================
  # 🎯 FRONTEND (Angular DEV MODE)
  # =========================
  frontend:
    build: ./frontend
    container_name: angular_app

    ports:
      - "${FRONTEND_PORT:-4200}:4200"

    volumes:
      - ./frontend:/app

    command: sh -c "npm install && npm run start"

    depends_on:
      - backend

    restart: unless-stopped

    networks:
      - app-network


  # =========================
  # 🔎 MILVUS (Vector DB - RAG)
  # =========================
  milvus:
    image: milvusdb/milvus:v2.3.3
    container_name: milvus

    command: ["milvus", "run", "standalone"]

    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: "local"

    ports:
      - "19530:19530"
      - "9091:9091"

    volumes:
      - milvus_data:/var/lib/milvus

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
      - app-network


  # =========================
  # 🗄️ MONGODB (stockage)
  # =========================
  mongodb:
    image: mongo:7
    container_name: mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

    restart: unless-stopped

    networks:
      - app-network


# =========================
# VOLUMES (PERSISTANCE)
# =========================
volumes:
  milvus_data:
  mongo_data:


# =========================
# NETWORK
# =========================
networks:
  app-network:
    driver: bridge

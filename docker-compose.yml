# POC-Agent-AI-ouvertures-echecs-FFE/docker-compose.yml

version: '3.9'

services:
  backend:
    build: ./backend
    container_name: fastapi_app

    ports:
      - "${BACKEND_PORT:-8000}:8000"

    env_file:
      - .env

    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: angular_app

    ports:
      - "${FRONTEND_PORT:-4200}:4200"

    volumes:
      - ./frontend:/app

    command: ["npm", "run", "start"]

    restart: unless-stopped

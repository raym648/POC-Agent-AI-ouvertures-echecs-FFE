<!-- POC-Agent-AI-ouvertures-echecs-FFE/frontend/src/app/features/board/board.component.html -->
 
<div class="board-page">

  <!-- =============================================== -->
  <!-- GAME MODE -->
  <!-- =============================================== -->

  <div class="game-mode-selector">

    <button
      type="button"
      class="mode-button"
      [class.active]="gameMode() === 'human-vs-human'"
      (click)="setGameMode('human-vs-human')">

      Humain vs Humain
    </button>

    <button
      type="button"
      class="mode-button"
      [class.active]="gameMode() === 'human-vs-ai'"
      (click)="setGameMode('human-vs-ai')">

      Humain vs AI
    </button>

  </div>

  <!-- =============================================== -->
  <!-- BLACK PLAYER -->
  <!-- =============================================== -->

  <div class="player-label top-player">

    {{ blackPlayerLabel() }}

  </div>

  <!-- =============================================== -->
  <!-- BOARD -->
  <!-- =============================================== -->

  <div class="board-wrapper">

    <div
      #board
      class="board">
    </div>

  </div>

  <!-- =============================================== -->
  <!-- WHITE PLAYER -->
  <!-- =============================================== -->

  <div class="player-label bottom-player">

    {{ whitePlayerLabel() }}

  </div>

  <!-- =============================================== -->
  <!-- ACTIONS -->
  <!-- =============================================== -->

  <div class="actions">

    <button
      type="button"
      class="reset-button"
      (click)="reset()">

      Reset
    </button>

  </div>

</div>

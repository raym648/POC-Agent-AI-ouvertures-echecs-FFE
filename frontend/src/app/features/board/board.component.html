<!-- POC-Agent-AI-ouvertures-echecs-FFE/frontend/src/app/features/board/board.component.html -->

<div class="board-page">

  <!-- =============================================== -->
  <!-- GAME MODE -->
  <!-- =============================================== -->

  <div class="game-mode-selector">

    <button
      type="button"
      class="mode-button"
      [class.active]="gameMode() === 'human-vs-human'"
      (click)="setGameMode('human-vs-human')">

      ♟️ Humain vs Humain

    </button>

    <button
      type="button"
      class="mode-button"
      [class.active]="gameMode() === 'human-vs-ai'"
      (click)="setGameMode('human-vs-ai')">

      🤖 Humain vs AI

    </button>

  </div>

  <!-- =============================================== -->
  <!-- BOARD CONTAINER -->
  <!-- =============================================== -->

  <div class="board-container">

    <!-- ============================================= -->
    <!-- BLACK PLAYER -->
    <!-- ============================================= -->

    <div
      class="player-label top-player">

      <span class="player-badge ai-badge">

        ♚

      </span>

      <span class="player-name">

        {{ blackPlayerLabel() }}

      </span>

    </div>

    <!-- ============================================= -->
    <!-- BOARD -->
    <!-- ============================================= -->

    <div class="board-wrapper">

      <div
        #board
        class="board">
      </div>

    </div>

    <!-- ============================================= -->
    <!-- WHITE PLAYER -->
    <!-- ============================================= -->

    <div
      class="player-label bottom-player">

      <span class="player-badge human-badge">

        ♔

      </span>

      <span class="player-name">

        {{ whitePlayerLabel() }}

      </span>

    </div>

  </div>

  <!-- =============================================== -->
  <!-- ACTIONS -->
  <!-- =============================================== -->

  <div class="actions">

    <button
      type="button"
      class="reset-button"
      (click)="reset()">

      ↺ Reset

    </button>

  </div>

  <!-- =============================================== -->
  <!-- STATUS -->
  <!-- =============================================== -->

  @if (store.loading()) {

    <div class="status loading-status">

      Analyse IA en cours...

    </div>

  }

  @if (store.error()) {

    <div class="status error-status">

      {{ store.error() }}

    </div>

  }

</div>
